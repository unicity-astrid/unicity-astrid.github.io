name: Website CI

on:
  pull_request:
    branches: [main]

permissions:
  contents: read

env:
  AOS_INSTALLER_SOURCE_COMMIT: dfa1d71c2737a016d8d4dd169d0755ff624f6b50
  ORACLE_INSTALLER_SOURCE_COMMIT: 83d0b478a5c7d7331d75c983ab51e708c9c19065

concurrency:
  group: website-ci-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - name: Check out website
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          path: unicity-aos-web
          persist-credentials: false

      - name: Check out canonical AOS CE installer
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          repository: unicity-aos/aos-ce
          ref: ${{ env.AOS_INSTALLER_SOURCE_COMMIT }}
          path: aos-ce
          persist-credentials: false
          sparse-checkout: install.sh
          sparse-checkout-cone-mode: false

      - name: Check out canonical Oracle installer
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          repository: unicity-aos/oracles
          ref: ${{ env.ORACLE_INSTALLER_SOURCE_COMMIT }}
          path: oracles
          persist-credentials: false
          sparse-checkout: install.sh
          sparse-checkout-cone-mode: false

      - name: Set up Node.js
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: unicity-aos-web/site/package-lock.json

      - name: Verify installer contract
        run: |
          test "$(git -C aos-ce rev-parse HEAD)" = "$AOS_INSTALLER_SOURCE_COMMIT"
          test "$(git -C oracles rev-parse HEAD)" = "$ORACLE_INSTALLER_SOURCE_COMMIT"
          sh -n unicity-aos-web/site/public/install.sh
          sh -n unicity-aos-web/site/public/base-install.sh
          sh -n unicity-aos-web/site/public/oracle-install.sh
          cmp aos-ce/install.sh unicity-aos-web/site/public/base-install.sh
          cmp oracles/install.sh unicity-aos-web/site/public/oracle-install.sh

      - name: Install dependencies
        working-directory: unicity-aos-web/site
        run: npm ci

      - name: Typecheck
        working-directory: unicity-aos-web/site
        env:
          ASTRO_TELEMETRY_DISABLED: '1'
        run: npm run check

      - name: Build
        working-directory: unicity-aos-web/site
        env:
          ASTRO_TELEMETRY_DISABLED: '1'
        run: npm run build

      - name: Test
        working-directory: unicity-aos-web/site
        run: npm test
