name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

env:
  # Existing aos-ce revision mirrored by site/public/install.sh. Update this full
  # commit and the mirror together after the canonical channel installer lands.
  AOS_INSTALLER_SOURCE_COMMIT: eb63fffe1250298045faa666841fae3a9cb101a4

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          path: unicity-aos-web
      - name: Check out pinned canonical installer source
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          repository: unicity-aos/aos-ce
          ref: ${{ env.AOS_INSTALLER_SOURCE_COMMIT }}
          path: aos-ce
          persist-credentials: false
      - name: Verify canonical installer mirror
        run: |
          test "$(git -C aos-ce rev-parse HEAD)" = "$AOS_INSTALLER_SOURCE_COMMIT"
          sh -n aos-ce/install.sh
          cmp aos-ce/install.sh unicity-aos-web/site/public/install.sh
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: unicity-aos-web/site/package-lock.json
      - name: Install
        working-directory: unicity-aos-web/site
        run: npm ci
      - name: Typecheck
        working-directory: unicity-aos-web/site
        env:
          ASTRO_TELEMETRY_DISABLED: '1'
        run: npm run check
      - name: Build
        working-directory: unicity-aos-web/site
        env:
          ASTRO_TELEMETRY_DISABLED: '1'
        run: npm run build
      - name: Verify built installer bytes
        run: cmp aos-ce/install.sh unicity-aos-web/site/dist/install.sh
      - name: Test release surfaces
        working-directory: unicity-aos-web/site
        run: npm test
      - uses: actions/upload-pages-artifact@56afc609e74202658d3ffba0e8f6dda462b719fa # v3
        with:
          path: unicity-aos-web/site/dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@d6db90164ac5ed86f2b6aed7e0febac5b3c0c03e # v4
