name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      # The site renders the book verbatim from its own repo, expecting it as
      # a sibling directory (see site/src/content.config.ts). Check both out
      # side by side.
      - uses: actions/checkout@v4
        with:
          path: astrid-web
      - uses: actions/checkout@v4
        with:
          repository: unicity-astrid/book
          # The book renders from its own main: the three-chapter afterword arc
          # and Your First Capsule are merged there now.
          ref: main
          path: astrid-book
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: astrid-web/site/package-lock.json
      - name: Install
        working-directory: astrid-web/site
        run: npm ci
      - name: Build
        working-directory: astrid-web/site
        env:
          ASTRO_TELEMETRY_DISABLED: '1'
        run: npm run build
      - uses: actions/upload-pages-artifact@v3
        with:
          path: astrid-web/site/dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
